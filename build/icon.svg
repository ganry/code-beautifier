<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111118"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="50%" style="stop-color:#764ba2"/>
      <stop offset="100%" style="stop-color:#f093fb"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="1024" height="1024" rx="228" fill="url(#bg)"/>

  <!-- Subtle glow -->
  <circle cx="380" cy="350" r="300" fill="url(#glow)" opacity="0.5"/>

  <!-- Code brackets </> -->
  <g fill="none" stroke="url(#accent)" stroke-width="52" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left bracket < -->
    <polyline points="390,310 240,512 390,714"/>
    <!-- Right bracket > -->
    <polyline points="634,310 784,512 634,714"/>
    <!-- Forward slash / -->
    <line x1="570" y1="270" x2="454" y2="754"/>
  </g>

  <!-- Window dots at top -->
  <circle cx="260" cy="175" r="22" fill="#ff5f57"/>
  <circle cx="330" cy="175" r="22" fill="#febc2e"/>
  <circle cx="400" cy="175" r="22" fill="#28c840"/>
</svg>
